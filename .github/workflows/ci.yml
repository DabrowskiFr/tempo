# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions: read-all

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    # The type of runner that the job will run on
    runs-on: ${{ matrix.os }}

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Checkout tree
        uses: actions/checkout@v4
      - name: Check documentation freshness (if script exists)
        run: |
          if [ -x ./tools/release/check_doc_freshness.sh ]; then
            ./tools/release/check_doc_freshness.sh
          else
            echo "Skipping doc freshness check: ./tools/release/check_doc_freshness.sh not found"
          fi
      - name: Set-up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ocaml-variants.5.3.0+options
      - name: Install FluidSynth (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfluidsynth-dev pkg-config
      - name: Install FluidSynth (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install fluidsynth pkg-config
      - run: opam update
      - run: opam install logs mtime
      - run: opam install . --deps-only --with-doc --with-test
      - run: opam exec -- dune build @all
      - run: opam exec -- dune runtest
