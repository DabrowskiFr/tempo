name: Docs

on:
  push:
    branches:
      - main
      - develop
      - release/*
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tree
        uses: actions/checkout@v4

      - name: Set-up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ocaml-variants.5.3.0+options

      - name: Install dependencies (tempo only)
        run: |
          opam update
          opam install ./tempo.opam --deps-only --with-doc

      - name: Build API docs
        run: opam exec -- dune build -p tempo @doc

      - name: Upload docs artifact (CI)
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: _build/default/_doc/_html

      - name: Configure GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _build/default/_doc/_html

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
